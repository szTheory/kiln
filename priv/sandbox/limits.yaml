# Phase 3 D-112 - Kiln sandbox resource limits per stage kind.
# Loaded by Kiln.Sandboxes.Limits at boot into :persistent_term.

default:
  memory: "768m"
  memory_swap: "768m"
  cpus: 1
  pids_limit: 256
  ulimit_nofile: "4096:8192"
  ulimit_nproc: 128
  tmpfs_workspace: "512m"
  tmpfs_tmp: "128m"
  tmpfs_cache: "256m"

coding:
  memory: "2g"
  memory_swap: "2g"
  cpus: 2
  pids_limit: 512
  ulimit_nofile: "4096:8192"
  ulimit_nproc: 256
  tmpfs_workspace: "1024m"
  tmpfs_tmp: "256m"
  tmpfs_cache: "512m"

