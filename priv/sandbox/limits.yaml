  memory: "2g"
  memory_swap: "2g"
  cpus: 2
  pids_limit: 512
  ulimit_nofile: "4096:8192"
  ulimit_nproc: 256
  tmpfs_workspace: "1024m"
  tmpfs_tmp: "256m"
  tmpfs_cache: "512m"

merge:
