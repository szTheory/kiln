# Local OTLP receiver → Jaeger (Phase 9 / OBS-02). Host apps use
# OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 against the published port.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp/jaeger]
