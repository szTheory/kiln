services:
  db:
    image: ghcr.io/fboulnois/pg_uuidv7:1.7.0
    environment:
      POSTGRES_USER: kiln
      POSTGRES_PASSWORD: kiln_dev
      POSTGRES_DB: kiln_dev
    ports:
      - "5432:5432"
    volumes:
      - kiln_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiln"]
      interval: 2s
      timeout: 5s
      retries: 10

  sandbox-net-anchor:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    profiles: ["network-anchor"]
    networks:
      - kiln-sandbox

  dtu:
    build:
      context: ./priv/dtu
      dockerfile: Dockerfile
    image: kiln/dtu:dev
    networks:
      kiln-sandbox:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  kiln-sandbox:
    internal: true
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "172.28.0.0/24"

volumes:
  kiln_pgdata:
