services:
  # Phase 9 / OBS-02 — local trace pipeline (OTLP → Jaeger UI on :16686).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  db:
    image: ghcr.io/fboulnois/pg_uuidv7:1.7.0
    environment:
      POSTGRES_USER: kiln
      POSTGRES_PASSWORD: kiln_dev
      POSTGRES_DB: kiln_dev
    ports:
      # Host port is configurable when 5432 is already taken (see `.env.sample`).
      - "${KILN_DB_HOST_PORT:-5432}:5432"
    volumes:
      - kiln_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiln"]
      interval: 2s
      timeout: 5s
      retries: 10

  sandbox-net-anchor:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    profiles: ["network-anchor"]
    networks:
      - kiln-sandbox

  dtu:
    build:
      context: ./priv/dtu
      dockerfile: Dockerfile
    image: kiln/dtu:dev
    networks:
      kiln-sandbox:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - kiln_app_build:/app/_build
      - kiln_app_deps:/app/deps
      # Docker socket lets the app spawn sandbox containers via System.cmd("docker", ...).
      # Never forward DOCKER_HOST into the spawned stage containers themselves.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${PORT:-4000}:4000"
    environment:
      MIX_ENV: dev
      KILN_DEV_BIND_ALL: "1"
      DATABASE_URL: "ecto://kiln:kiln_dev@db:5432/kiln_dev"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:-}"
      # Sigra/Cloak vault key (Phase 36-01). docker_dev_start.sh auto-generates if unset.
      CLOAK_KEY: "${CLOAK_KEY:-}"
      PHX_HOST: "${PHX_HOST:-localhost}"
      PORT: "${PORT:-4000}"
    depends_on:
      db:
        condition: service_healthy

  tailscale:
    image: tailscale/tailscale:stable
    profiles: ["remote"]
    hostname: ${TAILSCALE_HOSTNAME:-kiln}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TAILSCALE_HOSTNAME: ${TAILSCALE_HOSTNAME:-kiln}
      TAILSCALE_TUNNEL_TARGET: ${TAILSCALE_TUNNEL_TARGET:-http://host.docker.internal:4000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - kiln_tailscale_state:/var/lib/tailscale
    command:
      - sh
      - -ec
      - |
        : "$${TS_AUTHKEY:?set TS_AUTHKEY before starting the remote profile}"
        tailscaled --state=/var/lib/tailscale/tailscaled.state --tun=userspace-networking &
        tailscaled_pid=$$!
        until tailscale status >/dev/null 2>&1; do sleep 1; done
        tailscale up --auth-key="$${TS_AUTHKEY}" --hostname="$${TAILSCALE_HOSTNAME}" --accept-dns=false --accept-routes=false
        tailscale serve --bg --https=443 "$${TAILSCALE_TUNNEL_TARGET}"
        wait "$$tailscaled_pid"

networks:
  kiln-sandbox:
    internal: true
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "172.28.0.0/24"

volumes:
  kiln_pgdata:
  kiln_tailscale_state:
  kiln_app_build:
  kiln_app_deps:
