services:
  db:
    image: ghcr.io/fboulnois/pg_uuidv7:1.7.0
    environment:
      POSTGRES_USER: kiln
      POSTGRES_PASSWORD: kiln_dev
      POSTGRES_DB: kiln_dev
    ports:
      - "5432:5432"
    volumes:
      - kiln_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiln"]
      interval: 2s
      timeout: 5s
      retries: 10

  sandbox-net-anchor:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    profiles: ["network-anchor"]
    networks:
      - kiln-sandbox

networks:
  kiln-sandbox:
    internal: true

volumes:
  kiln_pgdata:
