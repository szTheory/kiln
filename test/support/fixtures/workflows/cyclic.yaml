apiVersion: kiln.dev/v1
id: cyclic
version: 1
metadata:
  description: "3-stage workflow with a single valid entry (start) + a 2-node cycle downstream (loop_a <-> loop_b). Kiln.Workflows.Graph.topological_sort/1 MUST reject per D-62 validator 2 (DAG is acyclic). Stage ids satisfy D-58 (^[a-z][a-z0-9_]{1,31}$) so JSV accepts the shape — the rejection must come from the compiler's toposort step, not from schema validation."
  author: "kiln-test-suite"
  tags:
    - test
    - cyclic
    - rejection
signature: null
spec:
  caps:
    max_retries: 3
    max_tokens_usd: 1.00
    max_elapsed_seconds: 600
    max_stage_duration_seconds: 300
  model_profile: elixir_lib
  stages:
    - id: start
      kind: planning
      agent_role: planner
      depends_on: []
      timeout_seconds: 300
      retry_policy:
        max_attempts: 3
        backoff: exponential
        base_delay_seconds: 5
      sandbox: readonly
    - id: loop_a
      kind: coding
      agent_role: coder
      depends_on:
        - start
        - loop_b
      timeout_seconds: 300
      retry_policy:
        max_attempts: 3
        backoff: exponential
        base_delay_seconds: 5
      sandbox: readwrite
    - id: loop_b
      kind: testing
      agent_role: tester
      depends_on:
        - loop_a
      timeout_seconds: 300
      retry_policy:
        max_attempts: 3
        backoff: exponential
        base_delay_seconds: 5
      sandbox: readonly
